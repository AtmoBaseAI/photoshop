<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lumina Editor - Professional Photo Suite</title>
  <style>
    :root {
      --bg-app: #0f0f11;
      --bg-panel: #18181b;
      --bg-surface: #27272a;
      --bg-input: #09090b;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --text-main: #f4f4f5;
      --text-dim: #a1a1aa;
      --text-muted: #52525b;
      --border: #3f3f46;
      --radius: 8px;
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    body, html { 
      height: 100%; width: 100%; overflow: hidden; 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-app); color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    /* Main Layout */
    #app { height: 100vh; display: flex; flex-direction: column; }

    /* Header Styling */
    header {
      height: 48px; background: var(--bg-panel); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
      z-index: 100;
    }
    .header-group { display: flex; align-items: center; gap: 8px; }
    .logo { font-weight: 800; letter-spacing: -0.05em; color: var(--accent); margin-right: 12px; font-size: 18px; }

    /* Buttons & Inputs */
    .btn {
      background: transparent; border: 1px solid transparent; color: var(--text-dim);
      padding: 6px 10px; border-radius: 6px; cursor: pointer; transition: all 0.15s ease;
      display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500;
    }
    .btn:hover { background: var(--bg-surface); color: var(--text-main); border-color: var(--border); }
    .btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .btn.primary { background: var(--accent); color: white; }
    .btn.icon-only { padding: 8px; border-radius: 8px; }

    input[type="range"] { accent-color: var(--accent); height: 4px; border-radius: 2px; }
    select, input[type="number"], .input-text {
      background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main);
      border-radius: 4px; padding: 4px 8px; font-size: 12px;
    }

    /* Workspace */
    .workspace { flex: 1; display: flex; overflow: hidden; position: relative; }

    /* Toolbar (Left) */
    .toolbar {
      width: 52px; background: var(--bg-panel); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; padding: 10px 0; gap: 8px;
    }

    /* Inspector (Right) */
    .inspector {
      width: 280px; background: var(--bg-panel); border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .tabs { display: flex; border-bottom: 1px solid var(--border); background: #121214; }
    .tab {
      flex: 1; padding: 10px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
      text-align: center; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg-panel); }

    /* Panels */
    .panel { flex: 1; display: none; padding: 16px; overflow-y: auto; }
    .panel.active { display: block; }
    .panel-section { margin-bottom: 20px; }
    .panel-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; }

    /* Layers List */
    .layer-card {
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: 6px;
      padding: 8px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
      cursor: pointer; transition: transform 0.1s;
    }
    .layer-card:hover { border-color: var(--text-dim); }
    .layer-card.active { border-color: var(--accent); background: #1e293b; }
    .layer-thumb { width: 32px; height: 32px; background: #000; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
    .layer-info { flex: 1; font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Viewport */
    .viewport {
      flex: 1; background: #09090b; display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    #stage-container {
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      background-image: 
        linear-gradient(45deg, #18181b 25%, transparent 25%),
        linear-gradient(-45deg, #18181b 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #18181b 75%),
        linear-gradient(-45deg, transparent 75%, #18181b 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      position: relative;
      transform-origin: center;
    }
    canvas { display: block; }
    .overlay-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 5; }

    /* Footer */
    footer {
      height: 28px; background: var(--bg-panel); border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; padding: 0 12px;
      font-size: 11px; color: var(--text-dim);
    }

    /* UI Utilities */
    .row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    .label { font-size: 12px; color: var(--text-dim); min-width: 70px; }
    .hidden { display: none; }
    
    /* Icon Shim */
    .icon { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }
  </style>
</head>
<body>

<div id="app">
  <header>
    <div class="header-group">
      <span class="logo">LUMINA</span>
      <button class="btn" id="newLayer" aria-label="Create new layer">
        <svg class="icon"><path d="M12 5v14M5 12h14"/></svg> Layer
      </button>
      <div style="width:1px; height:20px; background:var(--border); margin:0 4px;"></div>
      <button class="btn icon-only" id="undo" title="Undo (Ctrl+Z)" aria-label="Undo"><svg class="icon"><path d="M9 14 4 9l5-5M4 9h10a5 5 0 0 1 5 5v3"/></svg></button>
      <button class="btn icon-only" id="redo" title="Redo (Ctrl+Y)" aria-label="Redo"><svg class="icon"><path d="m15 14 5-5-5-5M20 9H10a5 5 0 0 0-5 5v3"/></svg></button>
    </div>

    <div class="header-group">
      <button class="btn" id="fit" aria-label="Fit to viewport">Fit</button>
      <input type="range" id="zoomRange" min="10" max="800" value="100" style="width: 100px;" aria-label="Zoom level">
      <span id="zoomLabel" style="font-size: 12px; width: 40px;">100%</span>
    </div>

    <div class="header-group">
      <input type="file" id="fileInput" class="hidden" accept="image/*" multiple aria-label="Import images">
      <button class="btn primary" id="importBtn" aria-label="Import images">
        <svg class="icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg> Import
      </button>
    </div>
  </header>

  <div class="workspace">
    <aside class="toolbar" id="toolbar"></aside>

    <main class="viewport" id="viewport">
      <div id="stage-container">
        <canvas id="mainCanvas"></canvas>
        <canvas id="overlayCanvas" class="overlay-canvas"></canvas>
      </div>
    </main>

    <aside class="inspector">
      <div class="tabs">
        <div class="tab active" data-panel="layers">Layers</div>
        <div class="tab" data-panel="adjust">Adjust</div>
        <div class="tab" data-panel="filters">Filters</div>
      </div>
      
      <div class="panel active" id="panel-layers">
        <div class="panel-section">
          <div class="panel-title">Active Layer</div>
          <div class="row">
            <span class="label">Blend</span>
            <select id="blendMode" style="flex:1" aria-label="Blend mode">
              <option value="source-over">Normal</option>
              <option value="multiply">Multiply</option>
              <option value="screen">Screen</option>
              <option value="overlay">Overlay</option>
              <option value="difference">Difference</option>
            </select>
          </div>
          <div class="row">
            <span class="label">Opacity</span>
            <input type="range" id="layerOpacity" min="0" max="100" value="100" style="flex:1" aria-label="Layer opacity">
          </div>
        </div>
        <div id="layerList"></div>
      </div>

      <div class="panel" id="panel-adjust">
        <div class="panel-section">
          <div class="panel-title">Basic Correction</div>
          <div class="row">
            <span class="label">Brightness</span>
            <input type="number" id="brightVal" value="10" style="width:50px" aria-label="Brightness value">
            <button class="btn" id="btn-bright" aria-label="Apply brightness">Apply</button>
          </div>
          <div class="row">
            <button class="btn" style="flex:1" id="btn-grayscale" aria-label="Apply grayscale filter">Grayscale</button>
            <button class="btn" style="flex:1" id="btn-invert" aria-label="Apply invert filter">Invert</button>
          </div>
        </div>
        <div class="panel-section">
          <div class="panel-title">AI Quick Actions</div>
          <button class="btn primary" style="width:100%; margin-bottom:8px;" id="btn-removeBg" aria-label="Remove background">Remove Background</button>
          <button class="btn" style="width:100%;" id="btn-enhance" aria-label="Apply AI smart enhance">AI Smart Enhance</button>
        </div>
      </div>

      <div class="panel" id="panel-filters">
         <div class="panel-section">
          <div class="panel-title">Effects</div>
          <button class="btn" style="width:100%; margin-bottom:8px;" id="btn-denoise" aria-label="Reduce noise">Reduce Noise</button>
          <button class="btn" style="width:100%;" id="btn-subject" aria-label="Select subject">Select Subject</button>
         </div>
      </div>
    </aside>
  </div>

  <footer>
    <div id="status-tool">Tool: Move</div>
    <div id="status-coord">X: 0, Y: 0</div>
    <div id="status-mem">Memory: --</div>
  </footer>
</div>

<script>
/**
 * Professional Photo Editor Logic
 * Implements Layer Stack, Undo/Redo, Filters, and Tool interactions.
 */

const ICONS = {
  move: '<path d="m5 9-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/>',
  brush: '<path d="m12 19 7-7 3 3-7 7-3-3Z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5Z"/><path d="m2 2 5 5"/>',
  eraser: '<path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/>',
  select: '<rect width="18" height="18" x="3" y="3" rx="2" stroke-dasharray="4 4"/>',
  crop: '<path d="M6 2v14a2 2 0 0 0 2 2h14"/><path d="M18 22V8a2 2 0 0 0-2-2H2"/>',
  text: '<path d="M4 7V4h16v3M9 20h6M12 4v16"/>',
  wand: '<path d="m2 22 7-7M14 7l1 1M10 3l.01.01M10 11l.01.01M14 3l.01.01M7 7l.01.01" stroke-linecap="round"/>'
};

const DOM_CACHE = {};
const UI_ELEMENTS = [
  'newLayer', 'undo', 'redo', 'fit', 'zoomRange', 'zoomLabel', 'fileInput', 'importBtn',
  'toolbar', 'viewport', 'mainCanvas', 'overlayCanvas', 'stage-container', 'blendMode',
  'layerOpacity', 'layerList', 'brightVal', 'btn-bright', 'btn-grayscale', 'btn-invert',
  'btn-removeBg', 'btn-enhance', 'btn-denoise', 'btn-subject', 'status-tool', 'status-coord', 'status-mem'
];

// Pre-cache DOM elements
UI_ELEMENTS.forEach(id => {
  const el = document.getElementById(id);
  if (el) DOM_CACHE[id] = el;
});

class LuminaEditor {
  constructor() {
    // Canvas Setup
    this.canvas = DOM_CACHE['mainCanvas'];
    this.ctx = this.canvas.getContext('2d', { willReadFrequently: true });
    this.overlay = DOM_CACHE['overlayCanvas'];
    this.overlayCtx = this.overlay.getContext('2d');
    
    // View State
    this.zoom = 1;
    this.pan = { x: 0, y: 0 };
    this.layers = [];
    this.activeLayer = null;
    this.history = [];
    this.historyIndex = -1;
    this.tool = 'move';
    this.isDirty = true;
    
    // Tool State
    this.isPainting = false;
    this.dragStart = null;
    this.selection = null;
    this.brushSize = 20;
    this.brushColor = '#ffffff';
    
    // Animation state
    this.animationFrameId = null;
    this.lastMemoryUpdate = 0;
    this.memoryUpdateInterval = 1000;

    this.init();
  }

  init() {
    this.setupUI();
    this.setupEvents();
    this.createLayer('Background', true);
    this.resizeCanvas(1200, 800);
    this.saveHistory('Initial');
    this.animate();
  }

  setupUI() {
    this.buildToolbar();
    this.setupTabLogic();
  }

  buildToolbar() {
    const toolbar = DOM_CACHE['toolbar'];
    toolbar.innerHTML = '';
    
    Object.keys(ICONS).forEach((key, index) => {
      const btn = document.createElement('button');
      btn.className = `btn icon-only ${key === 'move' ? 'active' : ''}`;
      btn.innerHTML = `<svg class="icon">${ICONS[key]}</svg>`;
      btn.title = key.charAt(0).toUpperCase() + key.slice(1);
      btn.setAttribute('aria-label', key);
      btn.dataset.tool = key;
      btn.addEventListener('click', () => this.setTool(key, btn));
      toolbar.appendChild(btn);
    });
  }

  setupTabLogic() {
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab, .panel').forEach(el => el.classList.remove('active'));
        tab.classList.add('active');
        const panelId = `panel-${tab.dataset.panel}`;
        const panel = document.getElementById(panelId);
        if (panel) panel.classList.add('active');
      });
    });
  }

  setupEvents() {
    const viewport = DOM_CACHE['viewport'];
    
    // Create mouse position calculator
    const getPos = (e) => {
      const rect = this.canvas.getBoundingClientRect();
      const scaleX = this.canvas.width / rect.width;
      const scaleY = this.canvas.height / rect.height;
      return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
      };
    };

    // Canvas interaction
    this.canvas.addEventListener('mousedown', (e) => {
      const p = getPos(e);
      this.isPainting = true;
      this.dragStart = {
        ...p,
        layerX: this.activeLayer?.x || 0,
        layerY: this.activeLayer?.y || 0
      };
      
      if (this.tool === 'brush' || this.tool === 'eraser') {
        this.paint(p);
      } else if (this.tool === 'select' || this.tool === 'crop') {
        this.selection = { x: p.x, y: p.y, w: 0, h: 0 };
      }
    });

    window.addEventListener('mousemove', (e) => {
      const p = getPos(e);
      DOM_CACHE['status-coord'].textContent = `X: ${Math.round(p.x)}, Y: ${Math.round(p.y)}`;

      if (!this.isPainting) return;

      if (this.tool === 'move' && this.activeLayer) {
        this.activeLayer.x = this.dragStart.layerX + (p.x - this.dragStart.x);
        this.activeLayer.y = this.dragStart.layerY + (p.y - this.dragStart.y);
        this.isDirty = true;
      } else if (this.tool === 'brush' || this.tool === 'eraser') {
        this.paint(p);
      } else if (this.tool === 'select' || this.tool === 'crop') {
        this.selection.w = p.x - this.selection.x;
        this.selection.h = p.y - this.selection.y;
        this.drawOverlay();
      }
    });

    window.addEventListener('mouseup', () => {
      if (this.isPainting) {
        if (this.tool === 'crop' && this.selection) {
          this.applyCrop();
        }
        this.saveHistory(this.tool);
      }
      this.isPainting = false;
      this.isDirty = true;
    });

    // Zoom & Pan
    viewport.addEventListener('wheel', (e) => {
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        this.setZoom(this.zoom * delta);
      }
    });

    // UI Control Events
    this.setupUIControls();
    this.setupHotkeys();
  }

  setupUIControls() {
    DOM_CACHE['zoomRange'].addEventListener('input', (e) => {
      this.setZoom(e.target.value / 100);
    });

    DOM_CACHE['fit'].addEventListener('click', () => this.fitToViewport());
    DOM_CACHE['newLayer'].addEventListener('click', () => this.createLayer());
    DOM_CACHE['undo'].addEventListener('click', () => this.undo());
    DOM_CACHE['redo'].addEventListener('click', () => this.redo());
    DOM_CACHE['importBtn'].addEventListener('click', () => {
      DOM_CACHE['fileInput'].click();
    });

    DOM_CACHE['fileInput'].addEventListener('change', (e) => this.handleImport(e));

    // Blend mode and opacity
    DOM_CACHE['blendMode'].addEventListener('change', (e) => {
      if (this.activeLayer) {
        this.activeLayer.blend = e.target.value;
        this.isDirty = true;
      }
    });

    DOM_CACHE['layerOpacity'].addEventListener('input', (e) => {
      if (this.activeLayer) {
        this.activeLayer.opacity = e.target.value / 100;
        this.isDirty = true;
      }
    });

    // Filter buttons
    DOM_CACHE['btn-grayscale'].addEventListener('click', () => this.applyFilter('grayscale'));
    DOM_CACHE['btn-invert'].addEventListener('click', () => this.applyFilter('invert'));
    DOM_CACHE['btn-bright'].addEventListener('click', () => {
      this.applyFilter('brightness', +DOM_CACHE['brightVal'].value);
    });
    DOM_CACHE['btn-removeBg'].addEventListener('click', () => this.removeBackgroundHeuristic());
  }

  setupHotkeys() {
    window.addEventListener('keydown', (e) => {
      if (e.ctrlKey || e.metaKey) {
        if (e.key === 'z') {
          e.preventDefault();
          this.undo();
        } else if (e.key === 'y' || (e.shiftKey && e.key === 'z')) {
          e.preventDefault();
          this.redo();
        }
      }
      
      if (e.key === 'v') this.setToolByName('move');
      if (e.key === 'b') this.setToolByName('brush');
      if (e.key === 'e') this.setToolByName('eraser');
    });
  }

  setTool(name, btn) {
    this.tool = name;
    document.querySelectorAll('.toolbar .btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    DOM_CACHE['status-tool'].textContent = `Tool: ${name.charAt(0).toUpperCase() + name.slice(1)}`;
  }

  setToolByName(name) {
    const btn = document.querySelector(`.toolbar .btn[data-tool="${name}"]`);
    if (btn) this.setTool(name, btn);
  }

  resizeCanvas(w, h) {
    this.canvas.width = this.overlay.width = w;
    this.canvas.height = this.overlay.height = h;
    const stage = DOM_CACHE['stage-container'];
    stage.style.width = w + 'px';
    stage.style.height = h + 'px';
    this.isDirty = true;
  }

  createLayer(name = null, fillWhite = false) {
    const canvas = document.createElement('canvas');
    canvas.width = this.canvas.width;
    canvas.height = this.canvas.height;
    const ctx = canvas.getContext('2d');
    
    if (fillWhite) {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    const layer = {
      id: Math.random().toString(36).substr(2, 9),
      name: name || `Layer ${this.layers.length + 1}`,
      canvas,
      ctx,
      x: 0,
      y: 0,
      opacity: 1,
      blend: 'source-over',
      visible: true
    };

    this.layers.unshift(layer);
    this.activeLayer = layer;
    this.updateLayerUI();
    this.isDirty = true;
    return layer;
  }

  updateLayerUI() {
    const list = DOM_CACHE['layerList'];
    list.innerHTML = '';
    
    this.layers.forEach(layer => {
      const card = document.createElement('div');
      card.className = `layer-card ${layer === this.activeLayer ? 'active' : ''}`;
      
      const thumb = document.createElement('canvas');
      thumb.width = 32;
      thumb.height = 32;
      thumb.className = 'layer-thumb';
      
      const info = document.createElement('div');
      info.className = 'layer-info';
      info.textContent = layer.name;
      
      const visibilityBtn = document.createElement('button');
      visibilityBtn.className = 'btn icon-only';
      visibilityBtn.style.padding = '2px';
      visibilityBtn.textContent = layer.visible ? '👁' : '◌';
      visibilityBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        layer.visible = !layer.visible;
        this.updateLayerUI();
        this.isDirty = true;
      });

      card.appendChild(thumb);
      card.appendChild(info);
      card.appendChild(visibilityBtn);
      
      card.addEventListener('click', () => {
        this.activeLayer = layer;
        this.updateLayerUI();
      });

      list.appendChild(card);
      
      // Draw preview
      const tCtx = thumb.getContext('2d');
      if (tCtx) {
        tCtx.drawImage(layer.canvas, 0, 0, 32, 32);
      }
    });
  }

  paint(p) {
    if (!this.activeLayer) return;
    
    const ctx = this.activeLayer.ctx;
    const localX = p.x - this.activeLayer.x;
    const localY = p.y - this.activeLayer.y;
    
    ctx.save();
    ctx.globalCompositeOperation = this.tool === 'eraser' ? 'destination-out' : 'source-over';
    ctx.beginPath();
    ctx.arc(localX, localY, this.brushSize, 0, Math.PI * 2);
    ctx.fillStyle = this.brushColor;
    ctx.fill();
    ctx.restore();
    
    this.isDirty = true;
  }

  drawOverlay() {
    this.overlayCtx.clearRect(0, 0, this.overlay.width, this.overlay.height);
    if (this.selection) {
      this.overlayCtx.strokeStyle = '#3b82f6';
      this.overlayCtx.lineWidth = 2;
      this.overlayCtx.setLineDash([5, 5]);
      this.overlayCtx.strokeRect(this.selection.x, this.selection.y, this.selection.w, this.selection.h);
      
      this.overlayCtx.fillStyle = 'rgba(59, 130, 246, 0.1)';
      this.overlayCtx.fillRect(this.selection.x, this.selection.y, this.selection.w, this.selection.h);
      
      this.overlayCtx.setLineDash([]);
    }
  }

  applyCrop() {
    if (!this.selection) return;
    
    const s = this.selection;
    const rect = {
      x: Math.min(s.x, s.x + s.w),
      y: Math.min(s.y, s.y + s.h),
      w: Math.abs(s.w),
      h: Math.abs(s.h)
    };
    
    if (rect.w < 10 || rect.h < 10) return;

    this.layers.forEach(layer => {
      const temp = document.createElement('canvas');
      temp.width = rect.w;
      temp.height = rect.h;
      const tempCtx = temp.getContext('2d');
      if (tempCtx) {
        tempCtx.drawImage(
          layer.canvas,
          rect.x - layer.x, rect.y - layer.y,
          rect.w, rect.h,
          0, 0,
          rect.w, rect.h
        );
      }
      layer.canvas = temp;
      layer.ctx = tempCtx;
      layer.x = 0;
      layer.y = 0;
    });

    this.resizeCanvas(rect.w, rect.h);
    this.selection = null;
    this.overlayCtx.clearRect(0, 0, this.overlay.width, this.overlay.height);
    this.saveHistory('Crop');
  }

  applyFilter(type, val = 0) {
    if (!this.activeLayer) return;
    
    const imageData = this.activeLayer.ctx.getImageData(0, 0, this.activeLayer.canvas.width, this.activeLayer.canvas.height);
    const d = imageData.data;

    for (let i = 0; i < d.length; i += 4) {
      switch (type) {
        case 'grayscale': {
          const v = 0.21 * d[i] + 0.72 * d[i + 1] + 0.07 * d[i + 2];
          d[i] = d[i + 1] = d[i + 2] = v;
          break;
        }
        case 'invert':
          d[i] = 255 - d[i];
          d[i + 1] = 255 - d[i + 1];
          d[i + 2] = 255 - d[i + 2];
          break;
        case 'brightness': {
          d[i] = Math.min(255, Math.max(0, d[i] + val));
          d[i + 1] = Math.min(255, Math.max(0, d[i + 1] + val));
          d[i + 2] = Math.min(255, Math.max(0, d[i + 2] + val));
          break;
        }
      }
    }

    this.activeLayer.ctx.putImageData(imageData, 0, 0);
    this.isDirty = true;
    this.saveHistory(`Filter: ${type}`);
  }

  removeBackgroundHeuristic() {
    if (!this.activeLayer) return;
    
    const ctx = this.activeLayer.ctx;
    const imageData = ctx.getImageData(0, 0, this.activeLayer.canvas.width, this.activeLayer.canvas.height);
    const d = imageData.data;
    
    // Sample top-left pixel as reference
    const ref = [d[0], d[1], d[2]];
    const threshold = 40;

    for (let i = 0; i < d.length; i += 4) {
      const diff = Math.abs(d[i] - ref[0]) + Math.abs(d[i + 1] - ref[1]) + Math.abs(d[i + 2] - ref[2]);
      if (diff < threshold) {
        d[i + 3] = 0; // Set alpha to 0
      }
    }
    
    ctx.putImageData(imageData, 0, 0);
    this.isDirty = true;
    this.saveHistory('Remove Background');
  }

  handleImport(e) {
    const files = Array.from(e.target.files);
    let loadedCount = 0;

    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          const layer = this.createLayer(file.name);
          const ctx = layer.ctx;
          if (ctx) {
            ctx.drawImage(img, 0, 0, layer.canvas.width, layer.canvas.height);
          }
          this.isDirty = true;
          
          loadedCount++;
          if (loadedCount === files.length) {
            this.saveHistory('Import');
          }
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    // Reset file input
    e.target.value = '';
  }

  setZoom(z) {
    this.zoom = Math.min(Math.max(z, 0.1), 8);
    DOM_CACHE['zoomRange'].value = this.zoom * 100;
    DOM_CACHE['zoomLabel'].textContent = Math.round(this.zoom * 100) + '%';
    this.applyTransform();
  }

  fitToViewport() {
    const viewport = DOM_CACHE['viewport'];
    const scale = Math.min(
      viewport.clientWidth / this.canvas.width,
      viewport.clientHeight / this.canvas.height
    ) * 0.9;
    this.setZoom(scale);
  }

  applyTransform() {
    const stage = DOM_CACHE['stage-container'];
    stage.style.transform = `scale(${this.zoom})`;
  }

  saveHistory(label) {
    const snapshot = {
      label,
      layers: this.layers.map(layer => ({
        id: layer.id,
        name: layer.name,
        x: layer.x,
        y: layer.y,
        opacity: layer.opacity,
        blend: layer.blend,
        visible: layer.visible,
        data: layer.canvas.toDataURL('image/png')
      })),
      width: this.canvas.width,
      height: this.canvas.height
    };

    this.history = this.history.slice(0, this.historyIndex + 1);
    this.history.push(snapshot);
    this.historyIndex++;
    
    // Limit history size to prevent memory bloat
    const MAX_HISTORY = 50;
    if (this.history.length > MAX_HISTORY) {
      this.history.shift();
      this.historyIndex--;
    }
  }

  undo() {
    if (this.historyIndex > 0) {
      this.historyIndex--;
      this.restoreHistory(this.history[this.historyIndex]);
    }
  }

  redo() {
    if (this.historyIndex < this.history.length - 1) {
      this.historyIndex++;
      this.restoreHistory(this.history[this.historyIndex]);
    }
  }

  restoreHistory(state) {
    this.resizeCanvas(state.width, state.height);
    this.layers = state.layers.map(layerData => {
      const canvas = document.createElement('canvas');
      canvas.width = state.width;
      canvas.height = state.height;
      const ctx = canvas.getContext('2d');
      
      const img = new Image();
      img.onload = () => {
        if (ctx) {
          ctx.drawImage(img, 0, 0);
        }
        this.isDirty = true;
      };
      img.src = layerData.data;

      return {
        ...layerData,
        canvas,
        ctx
      };
    });

    this.activeLayer = this.layers[0] || null;
    this.updateLayerUI();
    this.isDirty = true;
  }

  render() {
    this.ctx.fillStyle = 'transparent';
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    
    const visibleLayers = [...this.layers].reverse().filter(l => l.visible);
    
    visibleLayers.forEach(layer => {
      this.ctx.save();
      this.ctx.globalAlpha = layer.opacity;
      this.ctx.globalCompositeOperation = layer.blend;
      this.ctx.drawImage(layer.canvas, layer.x, layer.y);
      this.ctx.restore();
    });
  }

  updateMemoryStats() {
    const now = Date.now();
    if (now - this.lastMemoryUpdate < this.memoryUpdateInterval) {
      return;
    }
    this.lastMemoryUpdate = now;

    if (window.performance && window.performance.memory) {
      const mb = (performance.memory.usedJSHeapSize / 1048576).toFixed(1);
      DOM_CACHE['status-mem'].textContent = `Memory: ${mb} MB`;
    }
  }

  animate() {
    if (this.isDirty) {
      this.render();
      this.updateMemoryStats();
      this.isDirty = false;
    }
    this.animationFrameId = requestAnimationFrame(() => this.animate());
  }

  dispose() {
    if (this.animationFrameId) {
      cancelAnimationFrame(this.animationFrameId);
    }
  }
}

// Start Editor
let editor = null;
window.addEventListener('load', () => {
  editor = new LuminaEditor();
});

window.addEventListener('beforeunload', () => {
  if (editor) {
    editor.dispose();
  }
});
</script>
</body>
</html>
